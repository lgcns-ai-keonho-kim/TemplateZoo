# Text-to-SQL 조회 대상 정의 파일
# - 프로젝트 루트에 두고 startup 시 로드한다.
# - DB 접속 정보는 connection.*_env로 환경 변수에서 주입한다.

version: 1

targets:
  - alias: housing
    engine: postgres
    connection:
      host_env: POSTGRES_HOST
      port_env: POSTGRES_PORT
      user_env: POSTGRES_USER
      password_env: POSTGRES_PW
      database: housing
      schema: data
    allowlist:
      tables:
        - name: boston_housing_price
          description: Boston housing price dataset
          columns:
            - name: CRIM
              description: per capita crime rate by town
            - name: ZN
              description: proportion of residential land zoned for lots over 25,000 sq.ft.
            - name: INDUS
              description: proportion of non-retail business acres per town
            - name: CHAS
              description: Charles River dummy variable (= 1 if tract bounds river; 0 otherwise)
            - name: NOX
              description: nitric oxides concentration (parts per 10 million)
            - name: RM
              description: average number of rooms per dwelling
            - name: AGE
              description: proportion of owner-occupied units built prior to 1940
            - name: DIS
              description: weighted distances to five Boston employment centres
            - name: RAD
              description: index of accessibility to radial highways
            - name: TAX
              description: full-value property-tax rate per $10,000
            - name: PTRATIO
              description: pupil-teacher ratio by town
            - name: B
              description: 1000(Bk - 0.63)^2 where Bk is the proportion of blacks by town
            - name: LSTAT
              description: "% lower status of the population"
            - name: MEDV
              description: Median value of owner-occupied homes in $1000's

        - name: "us_housing"
          description: US housing dataset
          columns:
            - name: price
              description: House price based on size and construction type
            - name: area
              description: House area (length and width)
            - name: bedrooms
              description: Number of bedrooms
            - name: bathrooms
              description: Number of bathrooms
            - name: stories
              description: Number of floors
            - name: mainroad
              description: Whether the house is near a main road
            - name: guestroom
              description: Whether guest room is available
            - name: basement
              description: Whether basement is available
            - name: hotwaterheating
              description: Whether hot water heating is available
            - name: airconditioning
              description: Whether air conditioning is available
            - name: parking
              description: Parking capacity or availability
            - name: prefarea
              description: Whether located in preferred area
            - name: furnishingstatus
              description: Furnishing status of the house

  - alias: population
    engine: postgres
    connection:
      host_env: POSTGRES_HOST
      port_env: POSTGRES_PORT
      user_env: POSTGRES_USER
      password_env: POSTGRES_PW
      database: population
      schema: data
    allowlist:
      tables:
        - name: population_of_all_us_cities
          description: Population statistics for US cities
          columns:
            - name: rank
              description: population ranking
            - name: "US City"
              description: city name
            - name: "US State"
              description: state name
            - name: "Population 2024"
              description: population at census 2024
            - name: "Population 2020"
              description: population at census 2020
            - name: "Annual Change"
              description: population change ratio
            - name: "Density (/mile2)"
              description: population density
            - name: "Area (mile2)"
              description: city area size

  - alias: ecommerce
    engine: postgres
    connection:
      host_env: POSTGRES_HOST
      port_env: POSTGRES_PORT
      user_env: POSTGRES_USER
      password_env: POSTGRES_PW
      database: ecommerce
      schema: data
    allowlist:
      tables:
        - name: AGENTS
          description: Sales agent master information
          columns:
            - name: AGENT_CODE
              description: Unique sales agent code (primary key)
            - name: AGENT_NAME
              description: Sales agent name
            - name: WORKING_AREA
              description: Assigned working area
            - name: COMMISSION
              description: Commission rate
            - name: PHONE_NO
              description: Contact phone number
            - name: COUNTRY
              description: Country affiliation

        - name: CUSTOMER
          description: Customer profile and assigned sales agent mapping
          columns:
            - name: CUST_CODE
              description: Unique customer code (primary key)
            - name: CUST_NAME
              description: Customer name
            - name: CUST_CITY
              description: Customer city
            - name: WORKING_AREA
              description: Customer working area
            - name: CUST_COUNTRY
              description: Customer country
            - name: GRADE
              description: Customer grade
            - name: OPENING_AMT
              description: Opening amount
            - name: RECEIVE_AMT
              description: Received amount
            - name: PAYMENT_AMT
              description: Payment amount
            - name: AGENT_CODE
              description: Assigned sales agent code (foreign key)

        - name: ORDERS
          description: Customer order transaction records
          columns:
            - name: ORD_NUM
              description: Unique order number (primary key)
            - name: ORD_AMOUNT
              description: Total order amount
            - name: ORD_DATE
              description: Order date
            - name: CUST_CODE
              description: Ordering customer code (foreign key)
            - name: AGENT_CODE
              description: Sales agent code for the order (foreign key)
